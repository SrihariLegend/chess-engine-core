name: Build & Upload Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux
            exe_suffix: ""
          - os: macos-latest
            asset_suffix: macos
            exe_suffix: ""
          - os: windows-latest
            asset_suffix: windows
            exe_suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      # CHANGE THIS if your produced binary name is different
      - name: Package binary
        shell: bash
        run: |
          set -euxo pipefail
          BIN_NAME="chess-engine-core"
          BIN_PATH="target/release/${BIN_NAME}${{ matrix.exe_suffix }}"

          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found at $BIN_PATH"
            echo "Available files in target/release:"
            ls -la target/release || true
            exit 1
          fi

          ASSET="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz"
          tar -czf "$ASSET" -C "target/release" "${BIN_NAME}${{ matrix.exe_suffix }}"
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
