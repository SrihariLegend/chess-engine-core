name: Build and Upload Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux
            binary_source: target/release/chess-engine-core
            binary_name: chess-engine-core-${{ github.ref_name }}-linux
          - os: windows-latest
            asset_suffix: windows
            binary_source: target/release/chess-engine-core.exe
            binary_name: chess-engine-core-${{ github.ref_name }}-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_source }}" "dist/${{ matrix.binary_name }}"
          echo "ASSET=dist/${{ matrix.binary_name }}" >> $GITHUB_ENV

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
